<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UDES · Plan de Trabajo Decanatura 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.wrap{max-width:600px;width:100%;text-align:center}
.cards{display:grid;gap:14px}
.card{background:#fff;border-radius:12px;padding:22px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);text-decoration:none;color:#1a1a2e;display:flex;align-items:center;gap:16px;transition:.2s;border:2px solid transparent}
.card:hover{border-color:#185FA5;transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.12)}
.card-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.c1 .card-icon{background:#e8f0fb}
.c2 .card-icon{background:#fff3cd}
.c3 .card-icon{background:#d4edda}
.card-text h2{font-size:14px;font-weight:700;color:#0C2340;margin-bottom:3px}
.card-text p{font-size:12px;color:#777}
.arrow{margin-left:auto;font-size:18px;color:#b0c4de}
</style>
</head>
<body>
<div class="wrap">
  <div id="udes-header-mount"></div>
  <div class="cards">
    <a class="card c1" href="fase1.html">
      <div class="card-icon">📋</div>
      <div class="card-text">
        <h2>Fase 1 · Planeación</h2>
        <p>Definición del plan de trabajo anual de la decanatura</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="card c2" href="fase2.html">
      <div class="card-icon">📊</div>
      <div class="card-text">
        <h2>Fase 2 · Seguimiento</h2>
        <p>Registro de avances y evidencias por el decano</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="card c3" href="fase3.html">
      <div class="card-icon">✅</div>
      <div class="card-text">
        <h2>Fase 3 · Auditoría</h2>
        <p>Verificación de evidencias por el auditor institucional</p>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
</div>
<script src="udes-branding.js"></script>
<script>
UdesHeader.render('#udes-header-mount',{subtitulo:'Plan de Trabajo Decanatura 2026'});
</script>
</body>
</html>
