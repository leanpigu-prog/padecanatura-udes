<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UDES · Fase 3: Auditoría · Plan de Trabajo 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:960px;margin:0 auto}
.upload-card{background:#fff;border-radius:12px;padding:28px;text-align:center;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.upload-title{font-size:16px;font-weight:700;color:#0C2340;margin-bottom:8px}
.upload-sub{font-size:12px;color:#777;margin-bottom:16px}
.upload-zone{border:2px dashed #b0c4de;border-radius:10px;padding:30px 20px;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:#185FA5;background:#f0f6ff}
.upload-zone input{display:none}
.upload-zone-label{font-size:13px;color:#185FA5;font-weight:600;cursor:pointer}
.upload-err{color:#e53e3e;font-size:12px;margin-top:8px}
.app{display:none}
.auditor-bar{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.auditor-bar label{font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:3px}
.auditor-bar input{border:1px solid #d0d8e4;border-radius:6px;padding:6px 10px;font-size:12px;min-width:180px}
.sem-global{border-radius:12px;padding:16px 20px;text-align:center;margin-bottom:1rem;border:2px solid #ccc}
.sem-global .si{font-size:32px;margin-bottom:4px}
.sem-global .sl{font-size:11px;font-weight:700;letter-spacing:.5px}
.sem-global .sp{font-size:26px;font-weight:700;margin:2px 0}
.sem-global .ss{font-size:11px;opacity:.85}
.sem-bar{height:8px;border-radius:4px;background:#e0e7ef;margin:8px auto 0;max-width:260px;overflow:hidden}
.sem-fill{height:100%;border-radius:4px}
.dims-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:1.5rem}
.dim-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.dim-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.dim-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dim-info{flex:1}
.dim-name{font-size:12px;font-weight:700;color:#0C2340}
.dim-stats{font-size:10px;color:#777;margin-top:1px}
.dim-arrow{font-size:10px;color:#999;transition:.2s}
.dim-arrow.open{transform:rotate(180deg)}
.dim-body{display:none;padding:0 10px 10px}
.dim-body.open{display:block}
.ac-card{border:1px solid #e2e9f2;border-radius:8px;padding:12px;margin-bottom:8px;background:#fafbff;transition:.3s}
.ac-card.rechazado{border-color:#e53e3e;background:#fff5f5}
.ac-card.aceptado{border-color:#38a169;background:#f0fff4}
.ac-title{font-size:12px;font-weight:700;color:#0C2340;margin-bottom:3px}
.ac-meta{font-size:10px;color:#888;margin-bottom:6px}
.ac-progress{height:4px;background:#e0e7ef;border-radius:2px;margin-bottom:8px;overflow:hidden}
.ac-fill{height:100%;border-radius:2px}
.act-item{background:#f4f7fb;border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid #b0c4de;transition:.2s}
.act-desc{font-size:11px;font-weight:600;color:#1a1a2e;margin-bottom:3px}
.act-resp{font-size:10px;color:#666;margin-bottom:4px}
.act-link{font-size:10px;margin-bottom:6px}
.act-link a{color:#185FA5}
.no-link{color:#e53e3e;font-style:italic}
.vrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.vbtn{border:none;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;opacity:.5;transition:.15s}
.vbtn.on{opacity:1;transform:scale(1.05)}
.vbtn-ace{background:#d4edda;color:#155724}
.vbtn-ace.on{background:#28a745;color:#fff}
.vbtn-rec{background:#f8d7da;color:#721c24}
.vbtn-rec.on{background:#e53e3e;color:#fff}
.vbtn-pen{background:#fff3cd;color:#856404}
.vbtn-pen.on{background:#b7850a;color:#fff}
.act-comment textarea{width:100%;border:1px solid #d0d8e4;border-radius:6px;padding:6px;font-size:11px;font-family:inherit;resize:vertical}
.btn-confirm{margin-top:6px;padding:5px 14px;border:none;border-radius:6px;background:#185FA5;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;width:100%}
.btn-confirm:hover{background:#0C447C}
.toolbar{background:#fff;border-radius:10px;padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tbtn{padding:8px 16px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.tbtn-pri{background:#185FA5;color:#fff}
.tbtn-pri:hover{background:#0C447C}
.tbtn-sec{background:#e8f0fb;color:#185FA5}
.tbtn-sec:hover{background:#d0e0f7}
.tbtn-upd{background:#f0fff4;color:#28a745;border:1px solid #c6f6d5}
.tbtn-upd:hover{background:#c6f6d5}
.status-msg{font-size:11px;color:#28a745;margin-left:8px}
.sv{background:#d4edda;border-color:#28a745}
.sv .dim-circle,.sv .sem-fill{background:#28a745}
.sa{background:#fff3cd;border-color:#ffc107}
.sa .dim-circle,.sa .sem-fill{background:#ffc107}
.sn{background:#ffe8d0;border-color:#fd7e14}
.sn .dim-circle,.sn .sem-fill{background:#fd7e14}
.sr{background:#f8d7da;border-color:#e53e3e}
.sr .dim-circle,.sr .sem-fill{background:#e53e3e}
.sg{background:#e2e8f0;border-color:#a0aec0}
.sg .dim-circle,.sg .sem-fill{background:#a0aec0}
</style>
</head>
<body>
<div class="wrap" style="display:none">
  <div id="udes-header-mount"></div>

  <div id="upload-section">
    <div class="upload-card">
      <div class="upload-title">📂 Cargar JSON de Fase 2</div>
      <div class="upload-sub">Cargue el archivo JSON exportado desde el Formulario de Seguimiento</div>
      <div class="upload-zone" onclick="document.getElementById('finput').click()">
        <input type="file" id="finput" accept=".json">
        <div class="upload-zone-label">Clic para seleccionar archivo JSON</div>
      </div>
      <div class="upload-err" id="upload-err"></div>
    </div>
  </div>

  <div class="app" id="app">
    <div class="auditor-bar">
      <div><label>Nombre del auditor *</label><input type="text" id="aud-nombre" placeholder="Nombre completo"></div>
      <div><label>Cargo</label><input type="text" id="aud-cargo" placeholder="Cargo institucional"></div>
      <div><label>Fecha auditoría</label><input type="date" id="aud-fecha"></div>
    </div>
    <div class="toolbar">
      <button class="tbtn tbtn-upd" onclick="recalcular()">🔄 Actualizar semáforos</button>
      <button class="tbtn tbtn-pri" onclick="generarPDF()">📄 Descargar PDF auditoría</button>
      <button class="tbtn tbtn-sec" onclick="descargarJSON()">💾 JSON auditado (Fase 3)</button>
      <span class="status-msg" id="status-msg"></span>
    </div>
    <div class="sem-global sg" id="sem-global">
      <div class="si">⚫</div>
      <div class="sl">ESTADO GENERAL</div>
      <div class="sp">-</div>
      <div class="ss">Cargando...</div>
      <div class="sem-bar"><div class="sem-fill" style="width:0%"></div></div>
    </div>
    <div class="dims-grid" id="dims-grid"></div>
  </div>
</div>
<script src="udes-branding.js"></script>
<script src="padeca-auth.js"></script>
<script>
UdesHeader.render('#udes-header-mount',{subtitulo:'Revisión y verificación de evidencias por el auditor institucional',badge:'Fase 3 · Auditoría'});
var planData = null;

var DIMS = {
  d1:'Gestión de calidad y autorregulación',
  d2:'Gestión de la oferta académica y cupos',
  d3:'Gestión académica',
  d4:'Gestión profesoral',
  d5:'Gestión administrativa',
  d6:'Gestión de extensión e investigación',
  d7:'Bienestar universitario'
};

document.getElementById('finput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!data.acciones || !data.facultad) {
        document.getElementById('upload-err').textContent = 'Archivo inválido. Use el JSON de Fase 2.';
        return;
      }
      planData = data;
      planData.acciones.forEach(function(a) {
        if (!a.actividades) a.actividades = [];
        if (!a.seguimientos) a.seguimientos = [];
      });
      document.getElementById('upload-section').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('aud-fecha').value = new Date().toISOString().slice(0,10);
      render();
    } catch(err) {
      document.getElementById('upload-err').textContent = 'Error al leer el archivo: ' + err.message;
    }
  };
  reader.readAsText(file);
});

function getLastSeg(a) {
  var s = a.seguimientos || [];
  return s.length ? s[s.length-1] : null;
}

function getAud() {
  return {
    nombre: (document.getElementById('aud-nombre').value||'').trim() || 'Auditor',
    cargo: (document.getElementById('aud-cargo').value||'').trim() || 'Por definir',
    fecha: document.getElementById('aud-fecha').value || new Date().toISOString().slice(0,10)
  };
}

function calcAuditPct(a, seg) {
  var acts = a.actividades || [];
  if (acts.length) {
    var aceptadas = acts.filter(function(act) {
      var as = (seg&&seg.actividades||[]).find(function(s){return s.id===act.id;});
      return as && as.auditoria && as.auditoria.veredicto === 'Aceptado';
    }).length;
    return Math.round((aceptadas/acts.length)*100);
  }
  var audA = seg && seg.auditoriaAccion;
  return (audA && audA.veredicto === 'Aceptado') ? 100 : 0;
}

function calcSem(acs) {
  if (!acs || !acs.length) return {cls:'sg', emoji:'⚫', pct:0, label:'Sin acciones'};
  var ok = acs.every(function(a) {
    var seg = getLastSeg(a);
    if (!seg || parseInt(seg.avance||0) < 100) return false;
    var acts = a.actividades || [];
    if (!acts.length) return seg.auditoriaAccion && seg.auditoriaAccion.veredicto === 'Aceptado';
    return acts.every(function(act) {
      var as = (seg.actividades||[]).find(function(s){return s.id===act.id;});
      return as && as.auditoria && as.auditoria.veredicto === 'Aceptado';
    });
  });
  if (ok) return {cls:'sv', emoji:'🟢', pct:100, label:'Cumplimiento total verificado'};
  var sum = acs.reduce(function(t,a){
    var s = getLastSeg(a);
    var avance = s ? parseInt(s.avance||0) : 0;
    var auditPct = calcAuditPct(a, s);
    return t + Math.round((avance+auditPct)/2);
  }, 0);
  var pct = Math.round(sum/acs.length);
  if (pct>=70) return {cls:'sa', emoji:'🟡', pct:pct, label:'Avance parcial - requiere atención'};
  if (pct>=40) return {cls:'sn', emoji:'🟠', pct:pct, label:'Avance bajo - en riesgo'};
  return {cls:'sr', emoji:'🔴', pct:pct, label:'Avance crítico'};
}

function setStatus(msg) {
  var el = document.getElementById('status-msg');
  el.textContent = msg;
  setTimeout(function(){ el.textContent=''; }, 3000);
}

function render() { renderGlobal(); renderDims(); }

function renderGlobal() {
  var sem = calcSem(planData.acciones);
  var el = document.getElementById('sem-global');
  el.className = 'sem-global ' + sem.cls;
  el.innerHTML = '<div class="si">'+sem.emoji+'</div>' +
    '<div class="sl">ESTADO GENERAL — '+(planData.facultad.nombre||'')+'</div>' +
    '<div class="sp">'+sem.pct+'%</div>' +
    '<div class="ss">'+sem.label+'</div>' +
    '<div class="sem-bar"><div class="sem-fill" style="width:'+sem.pct+'%"></div></div>';
}

function renderDims() {
  var grid = document.getElementById('dims-grid');
  grid.innerHTML = '';
  Object.keys(DIMS).forEach(function(dk) {
    var acs = planData.acciones.filter(function(a){return a.dimension===dk;});
    var sem = calcSem(acs);
    var comp = acs.filter(function(a){var s=getLastSeg(a);return s&&parseInt(s.avance||0)===100;}).length;
    var card = document.createElement('div');
    card.className = 'dim-card';
    card.id = 'dim-'+dk;
    card.innerHTML =
      '<div class="dim-header" id="dh-'+dk+'">'+
        '<div class="dim-circle '+sem.cls+'">'+sem.emoji+'</div>'+
        '<div class="dim-info">'+
          '<div class="dim-name">'+DIMS[dk]+'</div>'+
          '<div class="dim-stats" id="ds-'+dk+'">'+sem.pct+'% avance — '+comp+'/'+acs.length+' al 100%</div>'+
        '</div>'+
        '<div class="dim-arrow" id="da-'+dk+'">▼</div>'+
      '</div>'+
      '<div class="dim-body" id="db-'+dk+'"></div>';
    grid.appendChild(card);
    card.querySelector('.dim-header').addEventListener('click', function() {
      var body = document.getElementById('db-'+dk);
      var arrow = document.getElementById('da-'+dk);
      if (body.classList.contains('open')) {
        body.classList.remove('open'); arrow.classList.remove('open');
      } else {
        body.classList.add('open'); arrow.classList.add('open');
        renderAcciones(dk, acs, body);
      }
    });
  });
}

function renderAcciones(dk, acs, body) {
  body.innerHTML = '';
  if (!acs.length) {
    body.innerHTML = '<div style="padding:10px;font-size:11px;color:#aaa">Sin acciones</div>';
    return;
  }
  acs.forEach(function(a) {
    var seg = getLastSeg(a);
    var pct = seg ? parseInt(seg.avance||0) : 0;
    var stc = pct===100?'#28a745':pct>=70?'#ffc107':pct>=40?'#fd7e14':'#e53e3e';
    var div = document.createElement('div');
    div.className = 'ac-card';
    div.id = 'ac-'+a.id;
    div.innerHTML =
      '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px">'+
        '<div class="ac-title">'+(a.accion||a.descripcion||'Acción').substring(0,90)+'</div>'+
        '<span style="flex-shrink:0;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:'+stc+'22;color:'+stc+';border:1px solid '+stc+'">'+(seg?seg.estado||'':'Sin seg.')+' '+pct+'%</span>'+
      '</div>'+
      (a.meta&&a.meta!=='Por definir'?'<div class="ac-meta">Meta: '+a.meta+'</div>':'')+
      '<div class="ac-progress"><div class="ac-fill" style="width:'+pct+'%;background:'+stc+'"></div></div>';

    var acts = a.actividades || [];
    if (seg && acts.length) {
      acts.forEach(function(act) {
        var actSeg = (seg.actividades||[]).find(function(s){return s.id===act.id;}) || {};
        var aud2 = actSeg.auditoria || {};
        var ver = aud2.veredicto || 'Pendiente';
        var link = actSeg.linkEvidencia || '';

        var aDiv = document.createElement('div');
        aDiv.className = 'act-item';

        // Build innerHTML (no onclick strings)
        aDiv.innerHTML =
          '<div class="act-desc">'+act.descripcion+'</div>'+
          '<div class="act-resp">Resp: '+act.responsable+(act.fecha?' | Fecha: '+act.fecha:'')+'</div>'+
          '<div class="act-link">'+(link?'<a href="'+link+'" target="_blank" rel="noopener"><strong>Evidencia:</strong> '+link.substring(0,50)+(link.length>50?'...':'')+' ↗</a>':'<span class="no-link">⚠ Sin link de evidencia</span>')+'</div>'+
          '<div class="vrow">'+
            '<button class="vbtn vbtn-ace'+(ver==='Aceptado'?' on':'')+'" data-ver="Aceptado">✔ Aceptar</button>'+
            '<button class="vbtn vbtn-rec'+(ver==='Rechazado'?' on':'')+'" data-ver="Rechazado">✖ Rechazar</button>'+
            '<button class="vbtn vbtn-pen'+(ver==='Pendiente'?' on':'')+'" data-ver="Pendiente">⏳ Pendiente</button>'+
          '</div>'+
          '<div class="act-comment"><textarea id="com-'+act.id+'" rows="2" placeholder="Comentario del auditor (requerido si rechaza)...">'+(aud2.comentario||'')+'</textarea></div>'+
          '<button class="btn-confirm">✔ Confirmar y guardar</button>';

        // Wire veredicto buttons via event listeners
        aDiv.querySelectorAll('.vbtn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            aDiv.querySelectorAll('.vbtn').forEach(function(b){ b.classList.remove('on'); });
            btn.classList.add('on');
            var cfm = aDiv.querySelector('.btn-confirm');
            cfm.style.background = '#d4700a';
            cfm.textContent = '⚠ Confirmar cambio pendiente';
          });
        });

        // Wire confirm button
        aDiv.querySelector('.btn-confirm').addEventListener('click', function() {
          var cfm = this;
          var ver2 = 'Pendiente';
          aDiv.querySelectorAll('.vbtn').forEach(function(b){
            if (b.classList.contains('on')) ver2 = b.dataset.ver;
          });
          var com = document.getElementById('com-'+act.id);
          var aud3 = getAud();
          if (!seg.actividades) seg.actividades = [];
          var aS = seg.actividades.find(function(s){return s.id===act.id;});
          if (!aS) { aS={id:act.id}; seg.actividades.push(aS); }
          aS.auditoria = {
            veredicto: ver2,
            comentario: com ? com.value.trim() : '',
            auditor: aud3.nombre,
            cargo: aud3.cargo,
            fechaAuditoria: aud3.fecha
          };
          // Visual feedback
          var vc = {Aceptado:'#28a745',Rechazado:'#e53e3e',Pendiente:'#b7850a'};
          cfm.style.background = vc[ver2]||'#185FA5';
          cfm.textContent = '✔ Guardado — ' + ver2;
          aDiv.style.borderLeftColor = vc[ver2]||'#b0c4de';
          setTimeout(function(){
            cfm.style.background = '';
            cfm.textContent = '✔ Confirmar y guardar';
          }, 2500);
          recalcular();
          setStatus('Actividad confirmada: ' + ver2);
        });

        div.appendChild(aDiv);
      });
    } else if (!seg) {
      div.innerHTML += '<div style="font-size:11px;color:#e53e3e;margin-top:6px">Sin seguimiento registrado por el decano.</div>';
    } else {
      var audA = seg.auditoriaAccion || {};
      var verA = audA.veredicto || 'Pendiente';
      var linkA = seg.linkEvidenciaAccion || '';

      var aDiv2 = document.createElement('div');
      aDiv2.className = 'act-item';
      aDiv2.innerHTML =
        '<div class="act-desc" style="font-style:italic;color:#888">Esta acción no tiene actividades registradas — evidencia a nivel de acción</div>'+
        '<div class="act-link">'+(linkA?'<a href="'+linkA+'" target="_blank" rel="noopener"><strong>Evidencia:</strong> '+linkA.substring(0,50)+(linkA.length>50?'...':'')+' ↗</a>':'<span class="no-link">⚠ Sin link de evidencia</span>')+'</div>'+
        '<div class="vrow">'+
          '<button class="vbtn vbtn-ace'+(verA==='Aceptado'?' on':'')+'" data-ver="Aceptado">✔ Aceptar</button>'+
          '<button class="vbtn vbtn-rec'+(verA==='Rechazado'?' on':'')+'" data-ver="Rechazado">✖ Rechazar</button>'+
          '<button class="vbtn vbtn-pen'+(verA==='Pendiente'?' on':'')+'" data-ver="Pendiente">⏳ Pendiente</button>'+
        '</div>'+
        '<div class="act-comment"><textarea id="com-acc-'+a.id+'" rows="2" placeholder="Comentario del auditor (requerido si rechaza)...">'+(audA.comentario||'')+'</textarea></div>'+
        '<button class="btn-confirm">✔ Confirmar y guardar</button>';

      aDiv2.querySelectorAll('.vbtn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          aDiv2.querySelectorAll('.vbtn').forEach(function(b){ b.classList.remove('on'); });
          btn.classList.add('on');
          var cfm = aDiv2.querySelector('.btn-confirm');
          cfm.style.background = '#d4700a';
          cfm.textContent = '⚠ Confirmar cambio pendiente';
        });
      });

      aDiv2.querySelector('.btn-confirm').addEventListener('click', function() {
        var cfm = this;
        var ver2 = 'Pendiente';
        aDiv2.querySelectorAll('.vbtn').forEach(function(b){
          if (b.classList.contains('on')) ver2 = b.dataset.ver;
        });
        var com = document.getElementById('com-acc-'+a.id);
        var aud3 = getAud();
        seg.auditoriaAccion = {
          veredicto: ver2,
          comentario: com ? com.value.trim() : '',
          auditor: aud3.nombre,
          cargo: aud3.cargo,
          fechaAuditoria: aud3.fecha
        };
        var vc = {Aceptado:'#28a745',Rechazado:'#e53e3e',Pendiente:'#b7850a'};
        cfm.style.background = vc[ver2]||'#185FA5';
        cfm.textContent = '✔ Guardado — ' + ver2;
        aDiv2.style.borderLeftColor = vc[ver2]||'#b0c4de';
        setTimeout(function(){
          cfm.style.background = '';
          cfm.textContent = '✔ Confirmar y guardar';
        }, 2500);
        recalcular();
        setStatus('Acción confirmada: ' + ver2);
      });

      div.appendChild(aDiv2);
    }
    body.appendChild(div);
  });
}

function recalcular() {
  renderGlobal();
  Object.keys(DIMS).forEach(function(dk) {
    var acs = planData.acciones.filter(function(a){return a.dimension===dk;});
    var sem = calcSem(acs);
    var hdr = document.getElementById('dh-'+dk);
    if (!hdr) return;
    var circ = hdr.querySelector('.dim-circle');
    if (circ) { circ.className='dim-circle '+sem.cls; circ.textContent=sem.emoji; }
    var stats = document.getElementById('ds-'+dk);
    if (stats) {
      var comp=acs.filter(function(a){var s=getLastSeg(a);return s&&parseInt(s.avance||0)===100;}).length;
      stats.textContent = sem.pct+'% avance — '+comp+'/'+acs.length+' al 100%';
    }
    acs.forEach(function(a) {
      var card = document.getElementById('ac-'+a.id);
      if (!card) return;
      var seg = getLastSeg(a);
      var acts = a.actividades||[];
      if (!acts.length) return;
      var hayRec = acts.some(function(act){
        var as=(seg&&seg.actividades||[]).find(function(s){return s.id===act.id;});
        return as&&as.auditoria&&as.auditoria.veredicto==='Rechazado';
      });
      var todoAce = acts.every(function(act){
        var as=(seg&&seg.actividades||[]).find(function(s){return s.id===act.id;});
        return as&&as.auditoria&&as.auditoria.veredicto==='Aceptado';
      });
      card.className = 'ac-card'+(hayRec?' rechazado':todoAce?' aceptado':'');
    });
  });
}

function guardarTodo() {
  var aud = getAud();
  planData.acciones.forEach(function(a) {
    var seg = getLastSeg(a);
    if (!seg) return;
    if (!seg.actividades) seg.actividades = [];
    (a.actividades||[]).forEach(function(act) {
      var aDiv = document.querySelector('[id="com-'+act.id+'"]');
      if (!aDiv) return; // not rendered yet - skip
      var ver = 'Pendiente';
      // Find parent act-item and check vbtn.on
      var parent = aDiv.closest ? aDiv.closest('.act-item') : null;
      if (parent) {
        parent.querySelectorAll('.vbtn').forEach(function(b){
          if (b.classList.contains('on')) ver = b.dataset.ver;
        });
      }
      var aS = seg.actividades.find(function(s){return s.id===act.id;});
      if (!aS) { aS={id:act.id}; seg.actividades.push(aS); }
      if (!aS.auditoria || aS.auditoria.veredicto !== ver || aS.auditoria.comentario !== aDiv.value.trim()) {
        aS.auditoria = {
          veredicto: ver,
          comentario: aDiv.value.trim(),
          auditor: aud.nombre,
          cargo: aud.cargo,
          fechaAuditoria: aud.fecha
        };
      }
    });
    if (!(a.actividades||[]).length) {
      var comAcc = document.querySelector('[id="com-acc-'+a.id+'"]');
      if (comAcc) {
        var verAcc = 'Pendiente';
        var parentAcc = comAcc.closest ? comAcc.closest('.act-item') : null;
        if (parentAcc) {
          parentAcc.querySelectorAll('.vbtn').forEach(function(b){
            if (b.classList.contains('on')) verAcc = b.dataset.ver;
          });
        }
        if (!seg.auditoriaAccion || seg.auditoriaAccion.veredicto !== verAcc || seg.auditoriaAccion.comentario !== comAcc.value.trim()) {
          seg.auditoriaAccion = {
            veredicto: verAcc,
            comentario: comAcc.value.trim(),
            auditor: aud.nombre,
            cargo: aud.cargo,
            fechaAuditoria: aud.fecha
          };
        }
      }
    }
  });
  planData.auditoria = {auditor:aud.nombre, cargo:aud.cargo, fecha:aud.fecha, exportado:new Date().toISOString()};
}

function descargarJSON() {
  if (!planData) { setStatus('Cargue primero el JSON de Fase 2'); return; }
  if (!document.getElementById('aud-nombre').value.trim()) {
    document.getElementById('aud-nombre').focus();
    setStatus('⚠ Ingrese el nombre del auditor antes de exportar.');
    return;
  }
  guardarTodo();
  var blob = new Blob([JSON.stringify(planData,null,2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'Auditoria_'+(planData.facultad.codigo||'FAC')+'_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus('JSON descargado ✓');
}

// ── PDF ───────────────────────────────────────────────────────────────────
var margin=14, pageH=297, pageW=210, contentW=182, curY=0;

function checkPage(doc,n) {
  if (curY+(n||8) > pageH-margin) {
    doc.addPage(); curY=margin+22; drawHdrPDF(doc);
  }
}
function drawHdrPDF(doc) {
  doc.setFillColor(12,35,64); doc.rect(0,0,pageW,20,'F');
  try { doc.addImage('data:image/png;base64,'+UDES_LOGO_B64,'PNG',margin,1,85,16); } catch(e){}
  doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('Informe de Auditoría - Plan de Trabajo 2026', pageW-margin, 10, {align:'right'});
  doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(138,175,212);
  doc.text('Planeación Institucional - UDES', pageW-margin, 15, {align:'right'});
  doc.setTextColor(30,30,30);
}
var _pdfRetries=0;
function generarPDF() {
  if (!planData) { setStatus('Cargue primero el JSON de Fase 2'); return; }

  if (!document.getElementById('aud-nombre').value.trim()) {
    document.getElementById('aud-nombre').focus();
    setStatus('⚠ Ingrese el nombre del auditor antes de exportar.');
    return;
  }
  if (typeof window.jspdf === 'undefined') {
    if(++_pdfRetries>5){_pdfRetries=0;setStatus('Error: librería PDF no disponible. Verifique su conexión.');return;}
    setStatus('Cargando librería PDF...');
    setTimeout(generarPDF, 1000); return;
  }
  _pdfRetries=0;
  guardarTodo();
  var aud = getAud();
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  curY = margin + 22;
  drawHdrPDF(doc);

  // Cover
  doc.setFillColor(232,240,255); doc.rect(margin,curY,contentW,32,'F');
  doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(12,35,64);
  doc.text('INFORME DE AUDITORÍA', pageW/2, curY+8, {align:'center'});
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('Plan de Trabajo Anual de Decanatura 2026', pageW/2, curY+15, {align:'center'});
  doc.setFontSize(9);
  doc.text((planData.facultad.nombre||'').toUpperCase(), pageW/2, curY+22, {align:'center'});
  curY += 36;

  // Auditor block
  doc.setFillColor(245,245,255); doc.rect(margin,curY,contentW,14,'F');
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(80,80,80);
  doc.text('AUDITOR', margin+4, curY+5);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
  doc.text(aud.nombre+'  |  '+aud.cargo+'  |  '+aud.fecha, margin+4, curY+10);
  curY += 18;

  // Global semaforo
  var semG = calcSem(planData.acciones);
  var SC = {sv:[40,167,69], sa:[255,193,7], sn:[253,126,20], sr:[229,62,62], sg:[160,174,192]};
  var gc = SC[semG.cls]||SC.sg;
  doc.setFillColor(gc[0],gc[1],gc[2]); doc.rect(margin,curY,contentW,10,'F');
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('ESTADO GENERAL: '+semG.label+' - '+semG.pct+'%', margin+4, curY+7);
  curY += 14;

  // Per dimension
  Object.keys(DIMS).forEach(function(dk) {
    var acs = planData.acciones.filter(function(a){return a.dimension===dk;});
    if (!acs.length) return;
    var sem = calcSem(acs);
    var dc = SC[sem.cls]||SC.sg;

    checkPage(doc, 16);
    doc.setFillColor(dc[0],dc[1],dc[2]); doc.rect(margin,curY,contentW,8,'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
    doc.text(DIMS[dk]+' - '+sem.pct+'%', margin+3, curY+5.5);
    curY += 10;

    acs.forEach(function(a) {
      var seg = getLastSeg(a);
      var pct = seg ? parseInt(seg.avance||0) : 0;
      var stc = pct===100?[40,167,69]:pct>=70?[255,193,7]:pct>=40?[253,126,20]:[229,62,62];

      checkPage(doc, 12);
      doc.setFillColor(248,250,255); doc.rect(margin,curY,contentW,10,'F');
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(12,35,64);
      doc.text((a.accion||a.descripcion||'').substring(0,80), margin+3, curY+4);
      doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(100,100,100);
      doc.text('Avance: '+pct+'%  |  Estado: '+(seg?seg.estado||'':'Sin seguimiento')+(seg&&seg.notas?' | Notas: '+seg.notas.substring(0,40):''), margin+3, curY+8);
      curY += 12;

      (a.actividades||[]).forEach(function(act) {
        var actSeg = (seg&&seg.actividades||[]).find(function(s){return s.id===act.id;}) || {};
        var aud2 = actSeg.auditoria || {};
        var ver = aud2.veredicto || 'Pendiente';
        var com = aud2.comentario || '';
        var link = actSeg.linkEvidencia || 'Sin link';
        var vc = {Aceptado:[40,167,69], Rechazado:[229,62,62], Pendiente:[180,130,10]};
        var ac = vc[ver]||[150,150,150];

        checkPage(doc, com?20:16);
        doc.setFillColor(ac[0],ac[1],ac[2]); doc.rect(margin+4,curY,3,8,'F');
        doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30);
        doc.text(act.descripcion.substring(0,72), margin+9, curY+3.5);
        doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(100,100,100);
        doc.text('Resp: '+act.responsable+(act.fecha?' | Fecha: '+act.fecha:''), margin+9, curY+7);
        doc.setFontSize(6.5); doc.setFont('helvetica','bold'); doc.setTextColor(ac[0],ac[1],ac[2]);
        doc.text('['+ver+']', margin+9, curY+11);
        doc.setTextColor(100,100,100); doc.setFont('helvetica','normal'); doc.setFontSize(6);
        doc.text('Link: '+link.substring(0,58), margin+9, curY+15);
        curY += 17;
        if (com) {
          checkPage(doc, 6);
          doc.setTextColor(80,80,80); doc.setFontSize(6);
          doc.text('Comentario: '+com.substring(0,85), margin+9, curY);
          curY += 5;
        }
      });
      curY += 2;
    });
    curY += 4;
  });

  // Footer signature
  checkPage(doc, 18);
  doc.setFillColor(12,35,64); doc.rect(margin,curY,contentW,14,'F');
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('Auditor: '+aud.nombre, margin+4, curY+5);
  doc.setFont('helvetica','normal'); doc.setFontSize(7);
  doc.text('Cargo: '+aud.cargo+'  |  Fecha: '+aud.fecha, margin+4, curY+10);

  // Page numbers
  var total = doc.internal.getNumberOfPages();
  for (var p=1; p<=total; p++) {
    doc.setPage(p);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(150,150,150);
    doc.text('Pág. '+p+'/'+total+' — Planeación Institucional - UDES · Auditoría Plan de Trabajo 2026', pageW-margin, pageH-4, {align:'right'});
  }

  doc.save('Auditoria_'+(planData.facultad.codigo||'FAC')+'_'+new Date().toISOString().slice(0,10)+'.pdf');
  setStatus('PDF de auditoría descargado ✓');
}

// ─── Persistencia en línea (Google Sheets) ─────────────────────
function mostrarSelectorFacultad(){
  if(document.getElementById('fac-sel-bar'))return;
  var bar=document.createElement('div');
  bar.id='fac-sel-bar';
  bar.className='upload-card';
  bar.innerHTML='<div class="upload-title">Seleccione la facultad a auditar</div>'+
    '<div class="upload-sub">Al presionar <strong>Cargar</strong> se trae el plan y los seguimientos que esa decanatura ya guardó en línea con su propio usuario (Fase 1 y Fase 2). Si la Fase 2 aún no ha registrado seguimientos, se le avisará aquí mismo.</div>'+
    '<select id="fac-sel" style="font-size:13px;padding:8px 12px;border-radius:7px;border:1px solid #d0d8e4;margin-right:8px">'+
    '<option value="">Seleccione...</option>'+
    ['FCS','FIT','FCMS','FCN','FCAV','FCEAC','CFTT'].map(function(f){return '<option value="'+f+'">'+f+'</option>';}).join('')+
    '</select><button class="tbtn tbtn-pri" onclick="cargarPlanDeSheets(document.getElementById(\'fac-sel\').value)">Cargar</button>';
  document.getElementById('upload-section').prepend(bar);
}

function cargarPlanDeSheets(fac){
  if(!fac){mostrarSelectorFacultad();return;}
  document.getElementById('upload-err').textContent='Buscando plan de la facultad '+fac+'...';
  cargarDeSheets(fac).then(function(row){
    if(!row||!row.json_data){
      document.getElementById('upload-err').textContent='No hay datos guardados para '+fac+'. Puede cargar un archivo JSON manualmente arriba.';
      return;
    }
    if(row.fase_actual==='fase1'){
      document.getElementById('upload-err').textContent='La Fase 2 aún no ha registrado seguimientos para la facultad '+fac+'.';
      return;
    }
    try{
      var data=JSON.parse(row.json_data);
      data.acciones.forEach(function(a){if(!a.actividades)a.actividades=[];if(!a.seguimientos)a.seguimientos=[];});
      planData=data;
      document.getElementById('upload-section').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('aud-fecha').value=new Date().toISOString().slice(0,10);
      render();
    }catch(e){document.getElementById('upload-err').textContent='Error al leer los datos guardados.';}
  });
}

function guardarBorradorFase3(){
  if(!planData)return;
  guardarTodo();
  guardarEnSheets(planData.facultad.codigo,'fase3',planData.decano,planData);
}
document.getElementById('app').addEventListener('input',guardarBorradorFase3);
document.getElementById('app').addEventListener('change',guardarBorradorFase3);
document.getElementById('app').addEventListener('click',function(){setTimeout(guardarBorradorFase3,0);});

PadecaAuth.init({allowedRoles:['auditor','admin']},function(s){
  document.querySelector('.wrap').style.display='block';
  cargarPlanDeSheets(facultadDeSesion());
});
